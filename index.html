<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>논술 타이머 & 가이드</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; }
        .blinking-dot {
            animation: pulse-dot 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased selection:bg-blue-200">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 기본 논술 작성 단계 데이터 (총 60분 기준)
        const DEFAULT_STAGES = [
            { id: 1, name: '묵독', duration: 3 },
            { id: 2, name: '읽기·분석', duration: 15 },
            { id: 3, name: '개요 작성', duration: 12 },
            { id: 4, name: '초안 작성', duration: 20 },
            { id: 5, name: '퇴고', duration: 10 },
        ];

        function EssayTimerApp() {
            const [topic, setTopic] = useState('');
            const [startTime, setStartTime] = useState('');
            const [currentTime, setCurrentTime] = useState(new Date());
            const [stages, setStages] = useState(DEFAULT_STAGES);

            // 1초마다 현재 시간 업데이트
            useEffect(() => {
                const timer = setInterval(() => {
                    setCurrentTime(new Date());
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            // HH:MM 형식의 문자열 반환 함수
            const formatTime = (date) => {
                return date.toLocaleTimeString('ko-KR', { hour12: false, hour: '2-digit', minute: '2-digit' });
            };

            // 시작 시간에 맞춰 각 단계별 시작/종료 시간 및 활성화 여부 계산
            const getCalculatedStages = () => {
                if (!startTime) return stages.map(s => ({ ...s, isActive: false, isPast: false }));

                const [hours, minutes] = startTime.split(':').map(Number);
                
                // 오늘 날짜 기준으로 시작 시간 Date 객체 생성
                let currentStageStart = new Date(currentTime);
                currentStageStart.setHours(hours, minutes, 0, 0);

                return stages.map(stage => {
                    const stageStart = new Date(currentStageStart);
                    const stageEnd = new Date(currentStageStart.getTime() + stage.duration * 60000);
                    
                    const isActive = currentTime >= stageStart && currentTime < stageEnd;
                    const isPast = currentTime >= stageEnd;

                    // 다음 단계를 위해 시작 시간 갱신
                    currentStageStart = stageEnd; 

                    return {
                        ...stage,
                        calculatedStart: formatTime(stageStart),
                        calculatedEnd: formatTime(stageEnd),
                        isActive,
                        isPast
                    };
                });
            };

            const calculatedStages = getCalculatedStages();

            // 소요 시간 변경 핸들러
            const handleDurationChange = (id, newDuration) => {
                const value = parseInt(newDuration, 10) || 0;
                setStages(stages.map(stage => 
                    stage.id === id ? { ...stage, duration: value } : stage
                ));
            };

            return (
                <div className="min-h-screen bg-slate-50 text-slate-800 font-sans selection:bg-blue-200">
                    <div className="max-w-6xl mx-auto p-4 md:p-6 flex flex-col min-h-screen">
                        
                        {/* 상단: 논제 입력 영역 */}
                        <header className="mb-6 md:mb-8">
                            <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-4 transition-all focus-within:ring-2 ring-blue-500">
                                <svg className="w-6 h-6 text-slate-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                                <input
                                    type="text"
                                    placeholder="여기에 논제(문제)를 입력하세요. (예: 기술 발전이 인간 소외에 미치는 영향을 논하시오.)"
                                    className="w-full bg-transparent text-lg md:text-xl outline-none placeholder:text-slate-400"
                                    value={topic}
                                    onChange={(e) => setTopic(e.target.value)}
                                />
                            </div>
                        </header>

                        {}
                        {/* 중앙: 논제 큰 글자 표시 및 현재 시간 영역 */}
                        <main className="flex-1 flex flex-col items-center justify-center py-8 md:py-12 px-4 text-center">
                            <div className="mb-8 w-full">
                                <p className="text-sm md:text-base font-medium text-slate-500 mb-3 tracking-widest uppercase">Current Topic</p>
                                <h1 className={`text-4xl md:text-5xl lg:text-6xl font-bold leading-tight break-keep ${topic ? 'text-slate-800' : 'text-slate-300'}`}>
                                    {topic || '논제를 입력하면 이곳에 표시됩니다'}
                                </h1>
                            </div>
                            
                            <div className="mt-4 md:mt-8 flex items-center gap-3 bg-white px-6 py-3 rounded-full shadow-sm border border-slate-100">
                                <div className="w-3 h-3 rounded-full bg-emerald-500 blinking-dot"></div>
                                <span className="text-xl md:text-2xl font-medium tracking-wide text-slate-700">
                                    {currentTime.toLocaleTimeString('ko-KR', { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' })}
                                </span>
                            </div>
                        </main>

                        {}
                        {/* 하단: 시작 시간 설정 및 가이드 표 영역 */}
                        <footer className="mt-auto pt-8">
                            <div className="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
                                
                                {/* 설정 헤더 */}
                                <div className="bg-slate-800 px-6 py-4 flex flex-col sm:flex-row items-center justify-between gap-4">
                                    <h2 className="text-white font-semibold text-lg flex items-center gap-2">
                                        <svg className="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                        시간별 작성 가이드 (총 60분)
                                    </h2>
                                    <div className="flex items-center gap-3 bg-slate-700/50 px-4 py-2 rounded-xl">
                                        <label htmlFor="startTime" className="text-slate-200 text-sm md:text-base font-medium">시작 시간 설정 :</label>
                                        <input
                                            id="startTime"
                                            type="time"
                                            className="px-3 py-1.5 rounded-lg bg-slate-100 text-slate-900 font-bold text-lg border-2 border-transparent focus:outline-none focus:border-blue-500 transition-colors cursor-pointer"
                                            value={startTime}
                                            onChange={(e) => setStartTime(e.target.value)}
                                        />
                                    </div>
                                </div>

                                {/* 단계별 표 */}
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse min-w-[700px]">
                                        <thead>
                                            <tr className="bg-slate-50 border-b border-slate-200 text-slate-500 text-sm md:text-base uppercase tracking-wider">
                                                <th className="px-6 py-4 font-bold w-40 md:w-48 text-center whitespace-nowrap">단계</th>
                                                <th className="px-6 py-4 font-bold w-40 md:w-48 text-center whitespace-nowrap">소요 시간(분)</th>
                                                <th className="px-6 py-4 font-bold text-center">예정 시간</th>
                                                <th className="px-6 py-4 font-bold w-32 text-center whitespace-nowrap">상태</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {calculatedStages.map((stage) => (
                                                <tr 
                                                    key={stage.id} 
                                                    className={`transition-colors duration-300 ${
                                                        stage.isActive 
                                                            ? 'bg-blue-50/70' 
                                                            : stage.isPast ? 'bg-slate-50/50 text-slate-400' : 'bg-white'
                                                    }`}
                                                >
                                                    {/* 단계 명칭 */}
                                                    <td className="px-6 py-5 md:py-6 relative text-center">
                                                        {stage.isActive && (
                                                            <div className="absolute left-0 top-0 bottom-0 w-1.5 bg-blue-600 rounded-r-full shadow-[0_0_8px_rgba(37,99,235,0.6)]"></div>
                                                        )}
                                                        <span className={`whitespace-nowrap ${stage.isActive ? 'text-blue-700 font-bold text-2xl md:text-3xl' : 'text-slate-700 font-semibold text-xl md:text-2xl'}`}>
                                                            {stage.name}
                                                        </span>
                                                    </td>
                                                    
                                                    {/* 소요 시간 (수정 가능) */}
                                                    <td className="px-6 py-5 md:py-6 text-center">
                                                        <div className="inline-flex items-center justify-center">
                                                            <input
                                                                type="number"
                                                                min="1"
                                                                value={stage.duration}
                                                                onChange={(e) => handleDurationChange(stage.id, e.target.value)}
                                                                className={`w-20 md:w-24 text-center rounded bg-transparent border-b-2 ${
                                                                    stage.isActive ? 'border-blue-400 text-blue-700 font-bold' : 'border-slate-300 focus:border-slate-500 font-semibold'
                                                                } focus:outline-none focus:bg-slate-100 transition-colors text-2xl md:text-3xl`}
                                                            />
                                                        </div>
                                                    </td>
                                                    
                                                    {/* 예정 시간 (매우 크게) */}
                                                    <td className="px-6 py-5 md:py-6 text-center font-mono">
                                                        {startTime ? (
                                                            <span className={`tracking-tight whitespace-nowrap ${stage.isActive ? 'text-blue-700 font-black text-5xl md:text-6xl drop-shadow-sm' : stage.isPast ? 'text-slate-400 text-4xl md:text-5xl font-bold' : 'text-slate-700 font-extrabold text-4xl md:text-5xl'}`}>
                                                                {stage.calculatedStart} - {stage.calculatedEnd}
                                                            </span>
                                                        ) : (
                                                            <span className="text-slate-200 text-4xl md:text-5xl font-black">-</span>
                                                        )}
                                                    </td>
                                                    
                                                    {/* 상태 표시 */}
                                                    <td className="px-6 py-5 md:py-6 text-center">
                                                        {startTime && stage.isActive && (
                                                            <span className="inline-flex items-center justify-center gap-2 px-4 py-2 rounded-full bg-blue-100 border border-blue-200 text-blue-800 text-base md:text-lg font-bold whitespace-nowrap shadow-sm">
                                                                <span className="w-2.5 h-2.5 rounded-full bg-blue-600 blinking-dot"></span>
                                                                진행 중
                                                            </span>
                                                        )}
                                                        {startTime && stage.isPast && (
                                                            <span className="inline-flex items-center justify-center gap-1.5 px-3 py-1.5 text-slate-400 text-sm md:text-base font-semibold whitespace-nowrap">
                                                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M5 13l4 4L19 7"></path></svg>
                                                                완료
                                                            </span>
                                                        )}
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </footer>
                    </div>
                </div>
            );
        }

        // 오류가 났던 부분 수정 완료 (정상적으로 태그 닫힘)
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<EssayTimerApp />);
    </script>
</body>
</html>
