<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>논술 타이머 & 가이드</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 추가적인 커스텀 스타일 정의 */
        body { margin: 0; padding: 0; }
        .blinking-dot {
            animation: pulse-dot 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased selection:bg-blue-200">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 총 60분 기준 초기 데이터 
        // 이미지의 10~15분 등은 연산을 위해 적절한 단일 숫자로 배분 (합계 60분)
        const DEFAULT_STAGES = [
            { id: 1, name: '묵독', duration: 3 },
            { id: 2, name: '읽기·분석', duration: 12 },
            { id: 3, name: '개요 작성', duration: 12 },
            { id: 4, name: '초안 작성', duration: 23 },
            { id: 5, name: '퇴고', duration: 10 },
        ];

        function EssayTimerApp() {
            const [topic, setTopic] = useState('');
            const [startTime, setStartTime] = useState('');
            const [currentTime, setCurrentTime] = useState(new Date());
            const [stages, setStages] = useState(DEFAULT_STAGES);

            // 1초마다 현재 시간 업데이트
            useEffect(() => {
                const timer = setInterval(() => {
                    setCurrentTime(new Date());
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            // HH:MM 형식의 문자열 반환 함수
            const formatTime = (date) => {
                return date.toLocaleTimeString('ko-KR', { hour12: false, hour: '2-digit', minute: '2-digit' });
            };

            // 시작 시간에 맞춰 각 단계별 시작/종료 시간 및 활성화 여부 계산
            const getCalculatedStages = () => {
                if (!startTime) return stages.map(s => ({ ...s, isActive: false, isPast: false }));

                const [hours, minutes] = startTime.split(':').map(Number);
                
                // 오늘 날짜 기준으로 시작 시간 Date 객체 생성
                let currentStageStart = new Date(currentTime);
                currentStageStart.setHours(hours, minutes, 0, 0);

                return stages.map(stage => {
                    const stageStart = new Date(currentStageStart);
                    const stageEnd = new Date(currentStageStart.getTime() + stage.duration * 60000);
                    
                    const isActive = currentTime >= stageStart && currentTime < stageEnd;
                    const isPast = currentTime >= stageEnd;

                    // 다음 단계를 위해 시작 시간 갱신
                    currentStageStart = stageEnd; 

                    return {
                        ...stage,
                        calculatedStart: formatTime(stageStart),
                        calculatedEnd: formatTime(stageEnd),
                        isActive,
                        isPast
                    };
                });
            };

            const calculatedStages = getCalculatedStages();

            // 소요 시간 변경 핸들러
            const handleDurationChange = (id, newDuration) => {
                const value = parseInt(newDuration, 10);
                setStages(stages.map(stage => 
                    stage.id === id ? { ...stage, duration: isNaN(value) ? '' : value } : stage
                ));
            };

            return (
                <div className="max-w-[1400px] mx-auto p-4 md:p-8 flex flex-col min-h-screen">
                    
                    {/* 상단: 논제 입력 영역 */}
                    <header className="mb-6 z-10">
                        <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-4 transition-all focus-within:ring-2 ring-blue-500">
                            <svg className="w-8 h-8 text-slate-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                            <input
                                type="text"
                                placeholder="여기에 논제를 입력하세요. (예: 기술 발전이 인간 소외에 미치는 영향을 논하시오.)"
                                className="w-full bg-transparent text-xl md:text-2xl outline-none placeholder:text-slate-400 font-medium"
                                value={topic}
                                onChange={(e) => setTopic(e.target.value)}
                            />
                        </div>
                    </header>

                    {/* 중앙: 논제 큰 글자 표시 및 현재 시간 영역 */}
                    <main className="flex-1 flex flex-col items-center justify-center py-6 px-4 text-center">
                        <div className="mb-6 w-full max-w-5xl">
                            <h1 className={`text-5xl md:text-6xl lg:text-7xl font-black leading-tight break-keep ${topic ? 'text-slate-800' : 'text-slate-300'}`}>
                                {topic || '논제가 화면에 표시됩니다'}
                            </h1>
                        </div>
                        
                        <div className="mt-4 flex items-center gap-4 bg-white px-8 py-4 rounded-full shadow-md border border-slate-200">
                            <div className="w-4 h-4 rounded-full bg-emerald-500 blinking-dot"></div>
                            <span className="text-3xl md:text-4xl font-bold tracking-wider text-slate-700 font-mono">
                                {currentTime.toLocaleTimeString('ko-KR', { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' })}
                            </span>
                        </div>
                    </main>

                    {/* 하단: 시작 시간 설정 및 가이드 표 영역 */}
                    <footer className="mt-auto pt-6 pb-4">
                        <div className="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
                            
                            {/* 설정 헤더 */}
                            <div className="bg-slate-800 px-8 py-5 flex flex-col sm:flex-row items-center justify-between gap-4">
                                <h2 className="text-white text-xl font-bold flex items-center gap-3 tracking-wide">
                                    <svg className="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    시간별 작성 가이드 (총 60분)
                                </h2>
                                <div className="flex items-center gap-4 bg-slate-700/50 px-5 py-2.5 rounded-xl border border-slate-600">
                                    <label htmlFor="startTime" className="text-slate-200 text-lg font-medium">시작 시간 :</label>
                                    <input
                                        id="startTime"
                                        type="time"
                                        className="px-4 py-2 rounded-lg bg-slate-100 text-slate-900 font-bold text-xl border-2 border-transparent focus:outline-none focus:border-blue-500 transition-colors cursor-pointer"
                                        value={startTime}
                                        onChange={(e) => setStartTime(e.target.value)}
                                    />
                                </div>
                            </div>

                            {/* 단계별 표 */}
                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse min-w-[800px]">
                                    <thead>
                                        <tr className="bg-slate-50 border-b-2 border-slate-200 text-slate-500 text-base uppercase tracking-widest">
                                            <th className="px-6 py-5 font-bold w-[20%] text-center">단계</th>
                                            <th className="px-6 py-5 font-bold w-[20%] text-center">시간(분)</th>
                                            <th className="px-6 py-5 font-bold w-[45%] text-center">예정 시간</th>
                                            <th className="px-6 py-5 font-bold w-[15%] text-center">상태</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y-2 divide-slate-100">
                                        {calculatedStages.map((stage) => (
                                            <tr 
                                                key={stage.id} 
                                                className={`transition-colors duration-300 ${
                                                    stage.isActive 
                                                        ? 'bg-blue-50/70' 
                                                        : stage.isPast ? 'bg-slate-50/50 text-slate-400' : 'bg-white'
                                                }`}
                                            >
                                                <td className="px-6 py-6 relative text-center">
                                                    {stage.isActive && (
                                                        <div className="absolute left-0 top-0 bottom-0 w-2 bg-blue-600 shadow-[0_0_12px_rgba(37,99,235,0.6)]"></div>
                                                    )}
                                                    <span className={`whitespace-nowrap ${stage.isActive ? 'text-blue-700 font-black text-3xl md:text-4xl' : 'text-slate-700 font-bold text-2xl md:text-3xl'}`}>
                                                        {stage.name}
                                                    </span>
                                                </td>
                                                
                                                <td className="px-6 py-6 text-center">
                                                    <div className="inline-flex items-center justify-center">
                                                        <input
                                                            type="number"
                                                            min="1"
                                                            value={stage.duration}
                                                            onChange={(e) => handleDurationChange(stage.id, e.target.value)}
                                                            className={`w-24 text-center rounded-lg bg-transparent border-b-4 ${
                                                                stage.isActive ? 'border-blue-500 text-blue-700 font-black' : 'border-slate-300 focus:border-slate-500 font-bold'
                                                            } focus:outline-none focus:bg-slate-100 transition-colors text-3xl md:text-4xl`}
                                                        />
                                                    </div>
                                                </td>
                                                
                                                <td className="px-6 py-6 text-center font-mono">
                                                    {startTime ? (
                                                        <span className={`tracking-tight whitespace-nowrap ${stage.isActive ? 'text-blue-700 font-black text-6xl md:text-7xl drop-shadow-sm' : stage.isPast ? 'text-slate-400 text-5xl md:text-6xl font-bold' : 'text-slate-700 font-extrabold text-5xl md:text-6xl'}`}>
                                                            {stage.calculatedStart} - {stage.calculatedEnd}
                                                        </span>
                                                    ) : (
                                                        <span className="text-slate-200 text-5xl md:text-6xl font-black">-</span>
                                                    )}
                                                </td>
                                                
                                                <td className="px-6 py-6 text-center">
                                                    {startTime && stage.isActive && (
                                                        <span className="inline-flex items-center justify-center gap-2 px-5 py-2.5 rounded-full bg-blue-100 border border-blue-200 text-blue-800 text-xl font-black whitespace-nowrap shadow-sm">
                                                            <span className="w-3 h-3 rounded-full bg-blue-600 blinking-dot"></span>
                                                            진행 중
                                                        </span>
                                                    )}
                                                    {startTime && stage.isPast && (
                                                        <span className="inline-flex items-center justify-center gap-1.5 px-4 py-2 text-slate-400 text-lg font
